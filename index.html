<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 EduManager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginView" class="login">

<div class="loginCard">

<h1>🎓 EduManager</h1>
<p>Gestão acadêmica inteligente</p>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button id="btnLogin">Entrar</button>

<small id="erroLogin"></small>

</div>

</div>

<div id="appView" class="app hidden">

<aside class="sidebar">

<h1>🎓 EduManager</h1>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('relatorios')">Relatórios</button>
<button onclick="logout()">Sair</button>

</aside>

<main class="main">

<header class="topbar">
<h2>Dashboard</h2>
<p>Painel de gestão acadêmica</p>
</header>

<section id="dashboard" class="section">

<div class="grid">

<div class="card">
<span>Total alunos</span>
<h3 id="totalAlunos">0</h3>
</div>

<div class="card">
<span>Aprovados</span>
<h3 id="aprovados">0</h3>
</div>

<div class="card">
<span>Reprovados</span>
<h3 id="reprovados">0</h3>
</div>

<div class="card">
<span>Média geral</span>
<h3 id="mediaGeral">0</h3>
</div>

</div>

</section>

<section id="alunos" class="section hidden">

<div class="panel">

<h3>Cadastrar aluno</h3>

<input id="nome" placeholder="Nome">
<input id="matricula" placeholder="Matrícula">
<input id="turma" placeholder="Turma">
<input id="nota1" type="number" placeholder="Nota 1">
<input id="nota2" type="number" placeholder="Nota 2">

<button id="btnCadastrar">Cadastrar</button>

</div>

<div class="panel">

<input id="pesquisa" placeholder="Buscar aluno...">

</div>

<div class="panel">

<table>

<thead>
<tr>
<th>Aluno</th>
<th>Matrícula</th>
<th>Turma</th>
<th>Média</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody id="tabelaAlunos"></tbody>

</table>

</div>

</section>

<section id="relatorios" class="section hidden">

<div class="panel">

<h3>Relatórios</h3>

<p>Total: <span id="rTotal"></span></p>
<p>Aprovação: <span id="rTaxa"></span>%</p>
<p>Média: <span id="rMedia"></span></p>

</div>

</section>

</main>

</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
